services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - ./logs:/app/logs
    # Puerto solo expuesto en dev; en prod Nginx hace de proxy
    # ports:
    #   - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn Elitian.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # CAMBIAR por tu dominio real antes de hacer el build de producción
        - NEXT_PUBLIC_API_URL=https://elitian.com.ar/api/v1
        - NEXT_PUBLIC_API_HOST=elitian.com.ar
        - NEXT_PUBLIC_MEDIA_URL=https://elitian.com.ar
    restart: unless-stopped
    depends_on:
      - backend
    # Puerto solo expuesto en dev; en prod Nginx hace de proxy
    # ports:
    #   - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_files:
  static_files:
