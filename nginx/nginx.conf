events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        # CAMBIAR por tu dominio real
        server_name elitian.com.ar www.elitian.com.ar;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS principal ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        # CAMBIAR por tu dominio real
        server_name elitian.com.ar www.elitian.com.ar;

        # Certificados Let's Encrypt — obtenerlos con certbot (ver README)
        ssl_certificate     /etc/letsencrypt/live/elitian.com.ar/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/elitian.com.ar/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;

        # ── Archivos estáticos de Django ───────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # ── Archivos de media (imágenes subidas) ───────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # ── API Django + Django admin + ckeditor ───────────────────────────────
        location ~ ^/(api|admin|ckeditor)/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend Next.js ───────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}
